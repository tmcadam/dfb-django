{% extends 'common/base.html' %}

{% block app_js %}
<!-- Add HTMX for async search -->
<script src="https://unpkg.com/htmx.org@1.9.10"></script>
{% endblock %}

{% block content %}
<div class="row align-items-center mb-3">
    <div class="col-md-6">
        <h3><strong>Manage Biographies</strong></h3>
    </div>
    <div class="col-md-6 text-right">
        <a href="{% url 'biographies:new' %}" class="btn btn-success btn-sm" role="button">New Biography</a>
    </div>
</div>

<!-- Search form using HTMX -->
<div class="col-xl-8 offset-xl-2 mb-4">
    <div class="input-group">
        <input class="form-control form-control-lg" type="search" name="search" placeholder="Search biographies..." 
               hx-get="{% url 'biographies:manage' %}" hx-trigger="keyup changed delay:500ms, search" 
               hx-target="#manage-table-container">
        <div class="input-group-append">
            <span class="input-group-text"><i class="fa fa-search"></i></span>
        </div>
    </div>
</div>

<div id="manage-table-container">
    {% include "biographies/_manage_table.html" %}
</div>

{% endblock %}
