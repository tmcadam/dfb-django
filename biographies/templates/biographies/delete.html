{% extends 'common/base.html' %}

{% block content %}
<div class="my-5 col-xl-8 offset-xl-2 text-center">
    <h4>Delete Biography</h4>
    <p>Are you sure you want to delete the biography <strong>"{{ object.title }}"</strong>?</p>
    <p class="text-danger"><small>This action cannot be undone.</small></p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Confirm Delete</button>
        <a href="{% url 'biographies:manage' %}" class="btn btn-outline-dark">Cancel</a>
    </form>
</div>
{% endblock %}
