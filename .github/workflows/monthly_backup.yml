name: Backup DFB - Monthly
description: Backup DFB Django application data and configuration.

on:
  workflow_dispatch:
    inputs:
      environment_name:
        description: 'Environment'
        required: true
        type: choice
        options:
          - staging
          - production


jobs:

  backup-dfb:

    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    env:
      INFRA_DIR: ${{ vars.INFRA_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rclone
        run: |
          set -e
          wget https://github.com/rclone/rclone/releases/download/v1.71.0/rclone-v1.71.0-linux-amd64.zip
          echo "3ddbcfd535ef2e6eb00cd006831766537f1fef1c8baeed1ee4632e7bcc699e93 rclone-v1.71.0-linux-amd64.zip" | sha256sum --check --status
          unzip rclone-v1.71.0-linux-amd64.zip
          cp rclone-v1.71.0-linux-amd64/rclone .
          chmod 755 rclone
          sudo mv rclone /usr/bin/
          rclone version

      - name: Setup Rclone config
        run: |
          mkdir -p ~/.rclone
          echo "${{ secrets.RCLONE_CONFIG }}" >> ~/.rclone/rclone.conf
          cat ~/.rclone/rclone.conf

      - name: Test Rclone config
        run: |
          echo "hello Tom" | rclone rcat onedrive:SWB_Backups/test2.txt --config ~/.rclone/rclone.conf
