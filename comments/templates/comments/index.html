{% extends 'common/base.html' %}

{% block content %}
<h3>
  <strong>Comments</strong>
</h3>

<table id="index" class="table">
    {% for comment in comments %}
    <tr>
        <td>
            <b>{{ comment.biography.title }}</b>
            <span class="small">({{ comment.name }} - {{ comment.created_at }})</span>
            <div class="small mt-2">
                {{ comment.comment }}<br>
                <em>Approved: {{ comment.approved }}</em>
            </div>
            <div class="btn-group float-right">
                <a href="{% url 'comments:edit' comment.id %}" class="btn btn-outline-dark btn-sm" role="button">Edit</a>
            </div>
        </td>
    </tr>
    {% empty %}
    <tr>
        <td>No results</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
