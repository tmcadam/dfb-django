{% extends 'common/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="my-5 col-xl-10 offset-xl-1">
    <h4>{% if object %}Edit{% else %}New{% endif %} static page</h4>
    
    <form method="post" class="form-horizontal">
        {% csrf_token %}
        {% crispy form %}

        <div class="form-actions mt-3">
            <button type="submit" class="btn btn-success">Save Page</button>
            <a href="{% url 'pages:home' %}" class="btn btn-outline-dark">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
